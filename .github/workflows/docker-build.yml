name: Build Docker Image
on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "Dockerfile"
  workflow_dispatch:

concurrency:
  group: format('{0}-{1}', ${{ github.ref }}, 'Build Docker Images')
  cancel-in-progress: true

jobs:
  push_to_registry:
    name: Push Docker image to Docker Hub
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: redteampanda/discord-bot-go

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: redteampanda/discord-bot-go:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,name=cache-docker
          cache-to: type=gha,mode=max,name=cache-docker
#      - name: Generate artifact attestation
#        uses: actions/attest-build-provenance@v1
#        with:
#          subject-name: redteampanda/discord-bot-go
#          subject-digest: ${{ steps.push.outputs.digest }}
#          push-to-registry: true
